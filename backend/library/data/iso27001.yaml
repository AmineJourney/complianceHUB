          en: "Critical areas must have controlled entry."
          fr: "Les zones critiques doivent avoir un accès contrôlé."
        implementation_guidance:
          en: "Install keycard access and maintain logs."
          fr: "Installer un accès par badge et conserver les journaux d'accès."
        evidence:
          - access_logs
          - security_badges
            # ───────────── A.13 Security Monitoring Controls ─────────────
  - code: "A.13.1"
    domain: "A.13"
    title:
      en: "Event Logging"
      fr: "Journalisation des événements"
    description:
      en: "Ensure that security-relevant events are logged and monitored."
      fr: "S'assurer que les événements liés à la sécurité sont enregistrés et surveillés."
    guidance:
      en: "Implement centralized logging and review logs regularly."
      fr: "Mettre en place une journalisation centralisée et examiner régulièrement les journaux."
    evidence_required:
      - log_files
      - monitoring_reports
    requirements:
      - id: "A.13.1.1"
        control: "A.13.1"
        text:
          en: "All security events must be logged and reviewed."
          fr: "Tous les événements de sécurité doivent être enregistrés et examinés."
        implementation_guidance:
          en: "Use SIEM or log aggregation tools for monitoring."
          fr: "Utiliser un SIEM ou des outils d'agrégation des journaux pour la surveillance."
        evidence:
          - log_files
          - monitoring_reports

  - code: "A.13.2"
    domain: "A.13"
    title:
      en: "Incident Management"
      fr: "Gestion des incidents"
    description:
      en: "Respond to security incidents in a timely and effective manner."
      fr: "Répondre aux incidents de sécurité de manière rapide et efficace."
    guidance:
      en: "Establish an incident response plan and reporting procedures."
      fr: "Établir un plan de réponse aux incidents et des procédures de signalement."
    evidence_required:
      - incident_reports
      - incident_response_plan
    requirements:
      - id: "A.13.2.1"
        control: "A.13.2"
        text:
          en: "All incidents must be documented and analyzed."
          fr: "Tous les incidents doivent être documentés et analysés."
        implementation_guidance:
          en: "Maintain a register of incidents and lessons learned."
          fr: "Conserver un registre des incidents et des enseignements tirés."
        evidence:
          - incident_reports
          - incident_response_plan

  # ───────────── A.14 Supplier and Third Party Controls ─────────────
  - code: "A.14.1"
    domain: "A.14"
    title:
      en: "Supplier Security Requirements"
      fr: "Exigences de sécurité des fournisseurs"
    description:
      en: "Ensure suppliers and third parties meet security requirements."
      fr: "S'assurer que les fournisseurs et tiers respectent les exigences de sécurité."
    guidance:
      en: "Include security clauses in contracts and review compliance."
      fr: "Inclure des clauses de sécurité dans les contrats et vérifier la conformité."
    evidence_required:
      - supplier_contracts
      - audit_reports
    requirements:
      - id: "A.14.1.1"
        control: "A.14.1"
        text:
          en: "All critical suppliers must comply with security policies."
          fr: "Tous les fournisseurs critiques doivent respecter les politiques de sécurité."
        implementation_guidance:
          en: "Conduct regular audits and assessments of suppliers."
          fr: "Effectuer des audits et évaluations réguliers des fournisseurs."
        evidence:
          - supplier_contracts
          - audit_reports

  # ───────────── A.15 Business Continuity Controls ─────────────
  - code: "A.15.1"
    domain: "A.15"
    title:
      en: "Business Continuity Planning"
      fr: "Planification de la continuité des activités"
    description:
      en: "Develop plans to ensure business operations continue during disruptions."
      fr: "Développer des plans pour assurer la continuité des activités pendant les perturbations."
    guidance:
      en: "Identify critical processes and create recovery strategies."
      fr: "Identifier les processus critiques et créer des stratégies de reprise."
    evidence_required:
      - business_continuity_plan
      - recovery_test_reports
    requirements:
      - id: "A.15.1.1"
        control: "A.15.1"
        text:
          en: "Business continuity plans must be established and tested."
          fr: "Les plans de continuité des activités doivent être établis et testés."
        implementation_guidance:
          en: "Conduct periodic testing and update plans accordingly."
          fr: "Effectuer des tests périodiques et mettre à jour les plans en conséquence."
        evidence:
          - business_continuity_plan
          - recovery_test_reports

  # ───────────── A.16 Risk and Audit Controls ─────────────
  - code: "A.16.1"
    domain: "A.16"
    title:
      en: "Internal Audit"
      fr: "Audit interne"
    description:
      en: "Perform audits to ensure compliance with policies and standards."
      fr: "Réaliser des audits pour assurer la conformité aux politiques et normes."
    guidance:
      en: "Plan and conduct audits based on risk and criticality."
      fr: "Planifier et réaliser des audits en fonction du risque et de la criticité."
    evidence_required:
      - audit_reports
      - audit_plans
    requirements:
      - id: "A.16.1.1"
        control: "A.16.1"
        text:
          en: "Audits must be scheduled and documented."
          fr: "Les audits doivent être planifiés et documentés."
        implementation_guidance:
          en: "Use internal audit teams or external auditors."
          fr: "Utiliser des équipes d'audit internes ou des auditeurs externes."
        evidence:
          - audit_reports
          - audit_plans

  # ───────────── A.17 Compliance Controls ─────────────
  - code: "A.17.1"
    domain: "A.17"
    title:
      en: "Legal and Regulatory Compliance"
      fr: "Conformité légale et réglementaire"
    description:
      en: "Ensure the organization complies with applicable laws and regulations."
      fr: "S'assurer que l'organisation respecte les lois et réglementations applicables."
    guidance:
      en: "Monitor changes in laws and maintain compliance records."
      fr: "Surveiller les changements législatifs et conserver les dossiers de conformité."
    evidence_required:
      - compliance_records
      - regulatory_reports
    requirements:
      - id: "A.17.1.1"
        control: "A.17.1"
        text:
          en: "All relevant laws and regulations must be identified and addressed."
          fr: "Toutes les lois et réglementations pertinentes doivent être identifiées et traitées."
        implementation_guidance:
          en: "Maintain a legal compliance register and review annually."
          fr: "Maintenir un registre de conformité légale et le réviser annuellement."
        evidence:
          - compliance_records
          - regulatory_reports

  # ───────────── A.18 Improvement Controls ─────────────
  - code: "A.18.1"
    domain: "A.18"
    title:
      en: "Continual Improvement"
      fr: "Amélioration continue"
    description:
      en: "Continually improve the ISMS to adapt to risks and changes."
      fr: "Améliorer continuellement le SGSI pour s'adapter aux risques et changements."
    guidance:
      en: "Review performance metrics and update policies and controls."
      fr: "Examiner les indicateurs de performance et mettre à jour les politiques et contrôles."
    evidence_required:
      - management_review_records
      - improvement_plans
    requirements:
      - id: "A.18.1.1"
        control: "A.18.1"
        text:
          en: "Management must review and improve the ISMS regularly."
          fr: "La direction doit examiner et améliorer régulièrement le SGSI."
        implementation_guidance:
          en: "Conduct management review meetings and track improvements."
          fr: "Organiser des réunions de revue de direction et suivre les améliorations."
        evidence:
          - management_review_records
          - improvement_plans