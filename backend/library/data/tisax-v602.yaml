  # ═══════════════════════════════════════════════════════════════════════════
  # DOMAIN 3: DATA PROTECTION (GDPR COMPLIANCE)
  # ═══════════════════════════════════════════════════════════════════════════

  - code: "3.1.1"
    domain: "3"
    title:
      en: "GDPR Compliance"
      fr: "Conformité RGPD"
    description:
      en: "Implementation of GDPR requirements for personal data processing"
      fr: "Mise en œuvre des exigences RGPD pour traitement données personnelles"
    based_on_iso: "A.18.1, A.5.31"
    legal_requirement: "EU GDPR"
    evidence_required:
      - data_processing_register
      - lawful_basis_documentation
      - privacy_impact_assessments
      - dpo_appointment
    requirements:
      - id: "3.1.1.1"
        control: "3.1.1"
        text:
          en: "All personal data processing must have documented lawful basis"
          fr: "Tout traitement données personnelles doit avoir base juridique documentée"
        implementation_guidance:
          en: "Document lawful basis for each processing activity (consent, contract, legal obligation, etc.)"
          fr: "Documenter base juridique pour chaque activité traitement"
        evidence:
          - processing_register_with_lawful_basis
      
      - id: "3.1.1.2"
        control: "3.1.1"
        text:
          en: "Data Protection Officer must be appointed if required"
          fr: "Délégué à la protection des données doit être nommé si requis"
        implementation_guidance:
          en: "Determine if DPO required based on processing activities, appoint and register with supervisory authority"
          fr: "Déterminer si DPO requis selon activités traitement, nommer et enregistrer"
        evidence:
          - dpo_appointment_letter
          - dpo_registration_confirmation

  - code: "3.1.2"
    domain: "3"
    title:
      en: "Data Subject Rights"
      fr: "Droits des personnes concernées"
    description:
      en: "Processes to handle data subject requests (access, rectification, erasure, portability)"
      fr: "Processus pour gérer demandes personnes concernées (accès, rectification, effacement, portabilité)"
    based_on_iso: "A.18.1, A.5.34"
    legal_requirement: "GDPR Articles 15-22"
    evidence_required:
      - dsar_procedure
      - request_fulfillment_logs
      - identity_verification_process
      - response_templates
    requirements:
      - id: "3.1.2.1"
        control: "3.1.2"
        text:
          en: "Data subject requests must be fulfilled within 30 days"
          fr: "Les demandes des personnes concernées doivent être satisfaites dans 30 jours"
        implementation_guidance:
          en: "Establish intake process, verify identity, retrieve data from all systems, provide in portable format"
          fr: "Établir processus réception, vérifier identité, récupérer données, fournir format portable"
        evidence:
          - dsar_fulfillment_records
          - sla_compliance_reports
      
      - id: "3.1.2.2"
        control: "3.1.2"
        text:
          en: "Identity verification must be performed before fulfilling data subject requests"
          fr: "Vérification identité doit être effectuée avant satisfaire demandes"
        implementation_guidance:
          en: "Implement identity verification process to prevent unauthorized disclosure"
          fr: "Implémenter processus vérification identité pour prévenir divulgation non autorisée"
        evidence:
          - identity_verification_procedure
          - verification_logs
